version: '3.8'

services:
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DATABASE_SSL=${DATABASE_SSL:-false}
      - NODE_ENV=${NODE_ENV:-production}
      - NEXT_TELEMETRY_DISABLED=1
      - NEXT_PUBLIC_ESQUIRE_EMAIL=${ESQUIRE_EMAIL}
      - JWT_SECRET=${JWT_SECRET}
      - TEAM_ACCESS_CODE=${TEAM_ACCESS_CODE}
      - MANAGEMENT_ACCESS_CODE=${MANAGEMENT_ACCESS_CODE}
      - ADMIN_ACCESS_CODE=${ADMIN_ACCESS_CODE}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: always

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DATABASE_SSL=${DATABASE_SSL:-false}
      - NODE_ENV=${NODE_ENV:-production}
      - ESQUIRE_EMAIL=${ESQUIRE_EMAIL}
      - ESQUIRE_PASSWORD=${ESQUIRE_PASSWORD}
      - MUSTEK_CUSTOMER_TOKEN=${MUSTEK_CUSTOMER_TOKEN}
      - SYNTECH_API_KEY=${SYNTECH_API_KEY}
      - PINNACLE_UID=${PINNACLE_UID}
      - PINNACLE_API_KEY=${PINNACLE_API_KEY}
      - EVENFLOW_API_URL=${EVENFLOW_API_URL}
      - EVENFLOW_API_KEY=${EVENFLOW_API_KEY}
      - UPDATE_INTERVAL_MINUTES=${UPDATE_INTERVAL_MINUTES:-60}
    depends_on:
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "node", "-e", "require('./src/ingestor.js').testConnection()"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 90s
    restart: always

  migrations:
    image: postgres:15-alpine
    environment:
      - PGUSER=${POSTGRES_USER:-postgres}
      - PGPASSWORD=${POSTGRES_PASSWORD:-postgres}
      - PGDATABASE=${POSTGRES_DB:-whosgotstock}
      - PGHOST=postgres
    volumes:
      - ./database:/migrations
    entrypoint: ["bash", "-c"]
    command: |
      echo "Waiting for PostgreSQL to be ready..."
      until pg_isready -h postgres -p 5432; do sleep 1; done
      echo "Running database migrations..."
      cd /migrations
      chmod +x run-migrations.sh
      ./run-migrations.sh
      echo "Migrations completed successfully"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-whosgotstock}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: always

volumes:
  postgres_data:
